description: >-
 What is Crafty Controller?
Crafty Controller is a Minecraft Server Control Panel / Launcher. The purpose of Crafty Controller is to launch a Minecraft Server in the background and present a web interface for the server administrators to interact with their servers. Crafty is compatible with Docker, Linux, Windows.

🔑 The default username for Crafty Controller is 'admin', and the password is randomly generated. You can find the password in the file located at: /umbrel/app-data/thehtnoel-crafty/data/config/default-creds.txt. It is highly recommended to change the password immediately after logging in for security purposes.
